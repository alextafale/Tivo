# ─── TIVO POS — Render Blueprint ─────────────────────────────────────────────
# Despliega automáticamente: PostgreSQL + Backend Node.js
# Docs: https://render.com/docs/blueprint-spec

services:
  # ─── Backend Node.js ────────────────────────────────────────────────────────
  - type: web
    name: tivo-backend
    runtime: node
    plan: free          # free tier: 512MB RAM, se suspende tras 15min inactividad
    rootDir: backend
    buildCommand: npm install && npm run build && npm run db:push
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tivo-db
          property: connectionString  # ← Render inyecta la URL automáticamente

      - key: NODE_ENV
        value: production

      - key: PORT
        value: 3000

      - key: JWT_SECRET
        generateValue: true   # ← Render genera un secreto aleatorio seguro

      - key: JWT_EXPIRES_IN
        value: 7d

      # ─── Qwen / DashScope ───────────────────────────────────────────────────
      # Agrega manualmente en el dashboard de Render → Environment
      - key: DASHSCOPE_API_KEY
        sync: false           # ← debes ponerla tú en el dashboard

      - key: QWEN_MODEL
        value: qwen-plus

      - key: QWEN_BASE_URL
        value: https://dashscope.aliyuncs.com/compatible-mode/v1

      - key: BUSINESS_NAME
        value: Mi Negocio TIVO

      - key: CORS_ORIGIN
        value: "*"

databases:
  # ─── PostgreSQL managed ─────────────────────────────────────────────────────
  - name: tivo-db
    databaseName: tivo_db
    user: tivo
    plan: free          # ⚠ Free tier expira a los 90 días (luego $7/mes)
    region: oregon      # Elige la región más cercana: oregon / frankfurt / singapore
